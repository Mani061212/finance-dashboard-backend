spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/financedb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    # Spring Boot 4 + Hibernate 7 auto-detects the dialect — do not set it manually
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false          # Disable OSIV — prevents lazy-load leaks in controllers
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    # JWT_SECRET must be a plain UTF-8 string, minimum 32 characters.
    # JwtTokenProvider calls secret.getBytes(UTF_8) → Keys.hmacShaKeyFor().
    # The default below is a 64-char hex string = 64 bytes, which is valid for HS512.
    # In production, set JWT_SECRET environment variable to a strong random value.
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000    # 7 days
  bcrypt:
    # Work factor 12 is strong. Lower to 10 in dev/test for faster hashing.
    strength: ${BCRYPT_STRENGTH:12}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha